<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jack Hughes Jersey Bet | NCAAB 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy: #0d1b2a; --navy-light: #1b263b;
      --red: #bf0a30; --red-dark: #8b0000;
      --blue: #002868; --gold: #ffd700; --green: #00d4aa;
    }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(180deg, var(--navy) 0%, #0a1628 100%); color: #fff; min-height: 100vh; }
    
    .header { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%); padding: 16px 20px; border-bottom: 4px solid; border-image: repeating-linear-gradient(90deg, var(--red) 0px, var(--red) 30px, #fff 30px, #fff 60px, var(--blue) 60px, var(--blue) 90px) 1; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .flag-logo { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(180deg, var(--red) 0%, var(--red) 15%, #fff 15%, #fff 30%, var(--red) 30%, var(--red) 45%, #fff 45%, #fff 60%, var(--red) 60%, var(--red) 75%, #fff 75%, #fff 100%); position: relative; border: 2px solid var(--gold); }
    .flag-logo::before { content: ''; position: absolute; top: 0; left: 0; width: 50%; height: 60%; background: var(--blue); border-radius: 50% 0 0 0; }
    .header-title h1 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; }
    .header-title .subtitle { font-size: 14px; color: var(--gold); letter-spacing: 3px; }
    .jersey-number { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: #fff; background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%); padding: 4px 14px; border-radius: 8px; border: 2px solid var(--gold); line-height: 1; }
    
    .race-container { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 16px; margin-top: 8px; }
    .race-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: rgba(255,255,255,0.6); letter-spacing: 2px; margin-bottom: 12px; }
    .race-lanes { display: flex; flex-direction: column; gap: 8px; }
    .race-lane { display: flex; align-items: center; gap: 10px; }
    .race-avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
    .race-track { flex: 1; height: 24px; background: rgba(255,255,255,0.1); border-radius: 4px; position: relative; }
    .race-progress { height: 100%; border-radius: 4px; position: absolute; left: 0; top: 0; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; font-size: 12px; font-weight: 700; min-width: 40px; }
    .race-potential { height: 100%; border-radius: 4px; position: absolute; top: 0; border: 2px dashed rgba(255,255,255,0.4); background: repeating-linear-gradient(90deg, transparent 0px, transparent 4px, rgba(255,255,255,0.1) 4px, rgba(255,255,255,0.1) 8px); }
    .race-info { width: 80px; text-align: right; font-size: 11px; color: rgba(255,255,255,0.6); }
    .race-pills { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .race-pill { background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 20px; font-size: 11px; color: rgba(255,255,255,0.8); }
    .race-pill strong { color: var(--gold); }
    
    .tabs { display: flex; gap: 4px; padding: 12px 16px; background: rgba(0,0,0,0.2); overflow-x: auto; }
    .tab { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: rgba(255,255,255,0.6); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .tab:hover { background: rgba(255,255,255,0.1); }
    .tab.active { background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%); color: #fff; border-color: var(--gold); }
    .tab-number { width: 22px; height: 22px; background: rgba(255,255,255,0.2); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 14px; }
    
    .content { padding: 16px; }
    .panel { display: none; }
    .panel.active { display: block; }
    
    .standings-list { display: flex; flex-direction: column; gap: 12px; }
    .standing-card { display: flex; align-items: center; gap: 14px; padding: 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; }
    .standing-card:first-child { background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,180,0,0.08)); border-color: rgba(255,215,0,0.3); }
    .standing-rank { font-size: 24px; width: 36px; text-align: center; }
    .standing-avatar { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; }
    .standing-info { flex: 1; min-width: 0; }
    .standing-name { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .standing-teams { display: flex; gap: 6px; flex-wrap: wrap; }
    .team-chip { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; }
    .team-chip.eliminated { opacity: 0.4; text-decoration: line-through; }
    .standing-points { text-align: right; }
    .points-current { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--gold); line-height: 1; }
    .points-potential { font-size: 12px; color: rgba(255,255,255,0.5); }
    
    .bracket-region-tabs { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
    .region-tab { flex: 1; min-width: 60px; padding: 10px 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .region-tab:hover { background: rgba(255,255,255,0.1); }
    .region-tab.active { border-color: var(--gold); }
    .region-tab.active.east, .region-tab.active.south { background: linear-gradient(135deg, var(--red), var(--red-dark)); }
    .region-tab.active.west, .region-tab.active.midwest { background: linear-gradient(135deg, var(--blue), #001845); }
    .region-tab.active.final-four { background: linear-gradient(135deg, var(--gold), #d4a800); color: #000; }
    .region-tab-name { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 1px; }
    .round-headers { display: flex; gap: 8px; margin-bottom: 12px; padding: 0 4px; }
    .round-header { flex: 1; text-align: center; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.5); padding: 6px 4px; background: rgba(255,255,255,0.05); border-radius: 4px; }
    .bracket-grid { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; }
    .bracket-column { min-width: 140px; flex-shrink: 0; display: flex; flex-direction: column; }
    .bracket-column.r1 { gap: 4px; }
    .bracket-column.r2 { gap: 4px; justify-content: space-around; }
    .bracket-column.r3 { gap: 4px; justify-content: space-around; }
    .bracket-column.r4 { gap: 4px; justify-content: center; }
    .matchup { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; overflow: hidden; position: relative; }
    .matchup.live { border-color: rgba(239,68,68,0.6); background: rgba(239,68,68,0.08); animation: livePulse 2s infinite; }
    @keyframes livePulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 0 4px rgba(239,68,68,0); } }
    .matchup-team { display: flex; align-items: center; padding: 8px 10px; cursor: pointer; transition: background 0.2s; gap: 8px; }
    .matchup-team:hover { background: rgba(255,255,255,0.08); }
    .matchup-team.winner { background: rgba(0,212,170,0.15); }
    .matchup-team.eliminated { opacity: 0.4; }
    .matchup-team.eliminated .team-name { text-decoration: line-through; }
    .matchup-team + .matchup-team { border-top: 1px solid rgba(255,255,255,0.1); }
    .seed-badge { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .team-name { flex: 1; font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .team-score { font-size: 14px; font-weight: 700; min-width: 28px; text-align: right; }
    .team-owner { width: 20px; height: 20px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
    .live-badge { background: rgba(239,68,68,0.2); color: #f87171; font-size: 10px; font-weight: 600; padding: 4px 8px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .live-dot { width: 6px; height: 6px; background: #ef4444; border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .matchup-empty { background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.1); border-radius: 8px; padding: 24px 10px; text-align: center; font-size: 11px; color: rgba(255,255,255,0.3); }
    .final-four-bracket { display: flex; flex-direction: column; gap: 20px; align-items: center; padding: 20px 0; }
    .ff-semifinal-row { display: flex; gap: 20px; width: 100%; justify-content: center; flex-wrap: wrap; }
    .ff-matchup { background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,180,0,0.05)); border: 2px solid rgba(255,215,0,0.3); border-radius: 12px; padding: 16px; min-width: 160px; max-width: 200px; }
    .ff-matchup-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.5); margin-bottom: 8px; text-align: center; }
    .ff-team { display: flex; align-items: center; gap: 8px; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 6px; margin-bottom: 6px; cursor: pointer; }
    .ff-team:last-child { margin-bottom: 0; }
    .ff-vs { text-align: center; font-size: 10px; color: rgba(255,255,255,0.3); padding: 4px 0; }
    .championship-matchup { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,180,0,0.1)); border: 3px solid var(--gold); border-radius: 16px; padding: 20px; text-align: center; min-width: 200px; }
    .championship-trophy { font-size: 40px; margin-bottom: 8px; }
    .championship-label { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--gold); margin-bottom: 12px; }
    .championship-teams { display: flex; flex-direction: column; gap: 8px; }
    
    .live-games { display: flex; flex-direction: column; gap: 12px; }
    .live-game { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; }
    .live-game.is-live { border-color: rgba(239,68,68,0.5); background: rgba(239,68,68,0.08); }
    .game-team { display: flex; align-items: center; gap: 10px; padding: 12px; }
    .game-team + .game-team { border-top: 1px solid rgba(255,255,255,0.1); }
    .game-team.winner .team-name { color: var(--green); }
    .game-score { font-size: 18px; font-weight: 700; min-width: 36px; text-align: right; }
    .game-status { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(255,255,255,0.05); border-top: 1px solid rgba(255,255,255,0.1); flex-wrap: wrap; gap: 8px; }
    .status-live { display: flex; align-items: center; gap: 6px; color: #f87171; font-weight: 600; font-size: 12px; }
    .watch-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%); border: none; border-radius: 6px; color: white; font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: none; }
    .channel-badge { padding: 4px 8px; background: rgba(255,255,255,0.1); border-radius: 4px; font-size: 11px; font-weight: 600; }
    .no-games { text-align: center; padding: 48px 20px; color: rgba(255,255,255,0.5); }
    .no-games-icon { font-size: 48px; margin-bottom: 12px; }
    
    .scoring-section { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .scoring-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; margin-bottom: 12px; color: var(--gold); }
    .scoring-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .scoring-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; text-align: center; }
    .scoring-round { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
    .scoring-points { font-family: 'Bebas Neue', sans-serif; font-size: 28px; }
    .multiplier-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    @media (min-width: 400px) { .multiplier-grid { grid-template-columns: repeat(4, 1fr); } }
    .multiplier-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; text-align: center; }
    .multiplier-seeds { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
    .multiplier-value { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--green); }
    
    /* Draft Styles */
    .draft-controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .draft-btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
    .draft-btn:hover { transform: translateY(-2px); }
    .draft-btn.primary { background: linear-gradient(135deg, var(--green), #00a080); color: #000; }
    .draft-btn.test { background: linear-gradient(135deg, #f59e0b, #d97706); color: #000; }
    .draft-btn.danger { background: linear-gradient(135deg, var(--red), var(--red-dark)); color: #fff; }
    .draft-btn.secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
    
    .on-the-clock { background: rgba(0,0,0,0.4); border-radius: 12px; padding: 16px; margin-bottom: 16px; text-align: center; position: relative; overflow: hidden; }
    .on-the-clock.warning { animation: borderPulse 1s infinite; }
    .on-the-clock.critical { animation: borderPulse 0.5s infinite; }
    @keyframes borderPulse { 0%, 100% { box-shadow: inset 0 0 0 3px transparent; } 50% { box-shadow: inset 0 0 0 3px var(--red); } }
    .clock-label { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
    .clock-drafter { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 12px; }
    .clock-avatar { width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; color: #fff; }
    .clock-name { font-size: 24px; font-weight: 700; }
    .clock-pick { font-size: 12px; color: rgba(255,255,255,0.5); }
    .clock-timer { font-family: 'Bebas Neue', sans-serif; font-size: 56px; line-height: 1; }
    .clock-timer.warning { color: #f59e0b; }
    .clock-timer.critical { color: #ef4444; }
    .auto-pick-warning { font-size: 12px; color: #ef4444; margin-top: 8px; }
    .up-next { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
    .up-next-label { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; }
    .up-next-avatars { display: flex; gap: 6px; }
    .up-next-avatar { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; }
    
    .draft-layout { display: flex; gap: 12px; flex-wrap: wrap; }
    .draft-main { flex: 1; min-width: 300px; }
    .draft-sidebar { width: 200px; flex-shrink: 0; }
    @media (max-width: 700px) { .draft-sidebar { width: 100%; } }
    
    .war-room { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
    @media (max-width: 500px) { .war-room { grid-template-columns: 1fr; } }
    .war-room-player { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px; transition: all 0.3s; }
    .war-room-player.active { border-color: var(--green); box-shadow: 0 0 15px rgba(0,212,170,0.2); }
    .war-room-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .war-room-avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; }
    .war-room-info { flex: 1; }
    .war-room-name { font-size: 13px; font-weight: 600; }
    .war-room-count { font-size: 10px; color: rgba(255,255,255,0.5); }
    .war-room-grade { font-size: 20px; font-weight: 700; }
    .war-room-grade.grade-a { color: var(--green); }
    .war-room-grade.grade-b { color: var(--gold); }
    .war-room-grade.grade-c { color: #f59e0b; }
    .war-room-grade.grade-d { color: #ef4444; }
    .war-room-stats { display: flex; gap: 8px; margin-bottom: 6px; font-size: 9px; }
    .war-room-stat { background: rgba(255,255,255,0.05); padding: 3px 6px; border-radius: 4px; }
    .region-bars { display: flex; gap: 2px; margin-bottom: 5px; }
    .region-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
    .war-room-teams { display: flex; flex-wrap: wrap; gap: 3px; max-height: 60px; overflow-y: auto; }
    .war-room-team { display: flex; align-items: center; gap: 3px; padding: 2px 5px; border-radius: 3px; font-size: 8px; cursor: pointer; }
    .war-room-seed { width: 12px; height: 12px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: 700; }
    
    .best-available { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 12px; margin-bottom: 12px; }
    .best-available-title { font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .best-available-list { display: flex; flex-direction: column; gap: 4px; max-height: 280px; overflow-y: auto; }
    .best-team-btn { display: flex; align-items: center; gap: 6px; padding: 8px 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; text-align: left; transition: all 0.2s; color: #fff; }
    .best-team-btn:hover { transform: translateX(4px); border-color: var(--gold); }
    .best-team-seed { width: 22px; height: 22px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
    .best-team-info { flex: 1; min-width: 0; }
    .best-team-name { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .best-team-stats { font-size: 9px; color: rgba(255,255,255,0.5); }
    .best-team-odds { font-size: 10px; color: var(--green); font-weight: 600; }
    
    .all-teams-section { margin-top: 16px; }
    .all-teams-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
    .all-teams-title { font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; }
    .region-filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .region-filter { padding: 4px 10px; background: rgba(255,255,255,0.1); border: none; border-radius: 4px; font-size: 10px; color: #fff; cursor: pointer; transition: all 0.2s; }
    .region-filter.active { background: var(--gold); color: #000; font-weight: 600; }
    .all-teams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 6px; max-height: 240px; overflow-y: auto; padding: 4px; }
    .all-team-btn { display: flex; align-items: center; gap: 6px; padding: 8px 10px; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; text-align: left; transition: all 0.2s; color: #fff; }
    .all-team-btn:hover { transform: translateY(-2px); }
    .all-team-btn.drafted { opacity: 0.3; pointer-events: none; }
    .all-team-seed { width: 24px; height: 24px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .all-team-info { flex: 1; min-width: 0; }
    .all-team-name { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .all-team-stats { font-size: 9px; color: rgba(255,255,255,0.5); }
    .all-team-odds { font-size: 9px; color: var(--green); }
    
    .draft-inactive { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 40px 20px; text-align: center; }
    .draft-inactive-icon { font-size: 48px; margin-bottom: 12px; }
    .draft-inactive-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .draft-inactive-desc { font-size: 13px; color: rgba(255,255,255,0.5); }
    
    .scouting-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 900; align-items: center; justify-content: center; padding: 20px; }
    .scouting-overlay.active { display: flex; }

    .confetti-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; overflow: hidden; z-index: 999; }
    @keyframes confettiFall { 0% { top: -20px; opacity: 1; } 100% { top: 100vh; opacity: 0; } }
    
    .popup-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }

    .popup-header { padding: 20px; position: relative; }

<body>
  <header class="header">
    <div class="header-top">
      <div class="header-left">
        <div class="flag-logo"></div>
        <div class="header-title">
          <h1>JACK HUGHES JERSEY BET</h1>
          <div class="subtitle">NCAAB 2026</div>
        </div>
      </div>
      <div class="jersey-number">2026</div>
    </div>
    <div class="race-container" id="raceContainer">
      <div class="race-title">🏁 THE RACE</div>
      <div class="race-lanes" id="raceLanes"></div>
      <div class="race-pills" id="racePills"></div>
    </div>
  </header>
  
  <nav class="tabs">
    <div class="tab active" data-tab="standings"><span class="tab-number">1</span><span>Standings</span></div>
    <div class="tab" data-tab="bracket"><span class="tab-number">2</span><span>Bracket</span></div>
    <div class="tab" data-tab="live"><span class="tab-number">3</span><span>Live</span></div>
    <div class="tab" data-tab="scoring"><span class="tab-number">4</span><span>Scoring</span></div>
    <div class="tab" data-tab="draft"><span class="tab-number">5</span><span>Draft</span></div>
  </nav>
  
  <main class="content">
    <div class="panel active" id="standings"><div class="standings-list" id="standingsList"></div></div>
    
    <div class="panel" id="bracket">
      <div class="bracket-region-tabs" id="regionTabs">
        <div class="region-tab east active" data-region="East"><div class="region-tab-name">EAST</div></div>
        <div class="region-tab west" data-region="West"><div class="region-tab-name">WEST</div></div>
        <div class="region-tab south" data-region="South"><div class="region-tab-name">SOUTH</div></div>
        <div class="region-tab midwest" data-region="Midwest"><div class="region-tab-name">MIDWEST</div></div>
        <div class="region-tab final-four" data-region="FinalFour"><div class="region-tab-name">🏆 F4</div></div>
      </div>
      <div id="bracketContent"></div>
    </div>
    
    <div class="panel" id="live"><div class="live-games" id="liveGames"></div></div>
    
    <div class="panel" id="scoring">
      <div class="scoring-section">
        <div class="scoring-title">Points Per Round</div>
        <div class="scoring-grid">
          <div class="scoring-item"><div class="scoring-round">Round 1</div><div class="scoring-points">1</div></div>
          <div class="scoring-item"><div class="scoring-round">Round 2</div><div class="scoring-points">2</div></div>
          <div class="scoring-item"><div class="scoring-round">Sweet 16</div><div class="scoring-points">8</div></div>
          <div class="scoring-item"><div class="scoring-round">Elite 8</div><div class="scoring-points">16</div></div>
          <div class="scoring-item"><div class="scoring-round">Final Four</div><div class="scoring-points">32</div></div>
          <div class="scoring-item"><div class="scoring-round">Championship</div><div class="scoring-points">32</div></div>
        </div>
      </div>
      <div class="scoring-section">
        <div class="scoring-title">Seed Multipliers</div>
        <div class="multiplier-grid">
          <div class="multiplier-item"><div class="multiplier-seeds">Seeds 1-4</div><div class="multiplier-value">1x</div></div>
          <div class="multiplier-item"><div class="multiplier-seeds">Seeds 5-8</div><div class="multiplier-value">1.5x</div></div>
          <div class="multiplier-item"><div class="multiplier-seeds">Seeds 9-12</div><div class="multiplier-value">2x</div></div>
          <div class="multiplier-item"><div class="multiplier-seeds">Seeds 13-16</div><div class="multiplier-value">3x</div></div>
        </div>
      </div>
    </div>
    
    <div class="panel" id="draft">
      <div class="draft-controls">
        <button class="draft-btn primary" id="startBtn" onclick="startDraft(false)">🚀 Start Draft</button>
        <button class="draft-btn test" id="testBtn" onclick="startDraft(true)">🧪 Test Draft</button>
        <button class="draft-btn danger" id="resetBtn" onclick="resetDraft()" style="display:none">🔄 Reset</button>
        <button class="draft-btn secondary" id="endBtn" onclick="endDraft()" style="display:none">⏹️ End</button>
      </div>
      <div id="draftContent"></div>
    </div>
  </main>
  
  <div class="last-update" id="lastUpdate"></div>
  <button class="refresh-btn" onclick="loadData()">↻</button>
  
  <div class="popup-overlay" id="popupOverlay"><div class="team-popup" id="teamPopup"></div></div>
  <div class="scouting-overlay" id="scoutingOverlay"><div class="scouting-report" id="scoutingReport"></div></div>
  <div class="pick-overlay" id="pickOverlay"><div class="pick-card" id="pickCard"></div></div>
  <div class="confetti-container" id="confettiContainer"></div>
  <div class="toast" id="toast"></div>

  <script>
    let appData = null, teamsData = null, oddsData = null, liveScores = {};
    let draftTimer = null, draftTimeLeft = 120;
    let currentRegion = 'East';
    let currentRegionFilter = 'all';
    let selectedTeamForDraft = null;
    
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');
      });
    });
    
    document.querySelectorAll('.region-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.region-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentRegion = tab.dataset.region;
        renderBracket();
      });
    });
    
    async function loadData() {
      try {
        const [dataRes, teamsRes, oddsRes, standingsRes] = await Promise.all([
          fetch('/api/data'), fetch('/api/teams'), fetch('/api/odds/all'), fetch('/api/standings')
        ]);
        appData = await dataRes.json();
        teamsData = await teamsRes.json();
        oddsData = await oddsRes.json();
        const standings = await standingsRes.json();
        renderRace(standings);
        renderStandings(standings);
        renderBracket();
        renderDraft();
        loadLiveGames();
        document.getElementById('lastUpdate').textContent = 'Last updated: ' + new Date(appData.lastUpdate).toLocaleString();
      } catch (err) { console.error('Failed to load:', err); }
    }
    
    function renderRace(standings) {
      const maxPossible = Math.max(...standings.map(s => s.maxPoints), 1);
      const leader = standings[0];
      document.getElementById('raceLanes').innerHTML = standings.map(s => {
        const progressPct = (s.totalPoints / maxPossible) * 100;
        const potentialPct = (s.potentialPoints / maxPossible) * 100;
        return `<div class="race-lane"><div class="race-avatar" style="background:linear-gradient(135deg,${s.colorPrimary},${s.colorSecondary})">${s.letter}</div><div class="race-track"><div class="race-progress" style="width:${Math.max(progressPct,8)}%;background:linear-gradient(90deg,${s.colorPrimary},${s.colorSecondary})">${s.totalPoints}</div><div class="race-potential" style="left:${progressPct}%;width:${potentialPct}%"></div></div><div class="race-info">${s.teamsAlive} alive</div></div>`;
      }).join('');
      const gap = leader.totalPoints - (standings[1]?.totalPoints || 0);
      const maxP = standings.reduce((a,b) => a.maxPoints > b.maxPoints ? a : b);
      document.getElementById('racePills').innerHTML = `<div class="race-pill"><strong>${leader.name}</strong> leads by ${gap} pts</div><div class="race-pill">Max potential: <strong>${maxP.name}</strong> (${maxP.maxPoints})</div><div class="race-pill">${standings.reduce((sum,s) => sum + s.teamsAlive, 0)} teams alive</div>`;
    }
    
    function renderStandings(standings) {
      document.getElementById('standingsList').innerHTML = standings.map((s, i) => {
        const rank = i === 0 ? '👑' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`;
        const chips = s.teams.map(t => {
          const team = teamsData[t]; if (!team) return '';
          let elim = false;
          for (const r of Object.keys(appData.bracket)) { const x = appData.bracket[r].find(y => y.name === t); if (x?.eliminated) elim = true; }
          return `<span class="team-chip ${elim?'eliminated':''}" style="background:linear-gradient(135deg,${team.colors[0]},${team.colors[0]}dd)" onclick="showTeamPopup('${t}')">${t}</span>`;
        }).join('');
        return `<div class="standing-card"><div class="standing-rank">${rank}</div><div class="standing-avatar" style="background:linear-gradient(135deg,${s.colorPrimary},${s.colorSecondary})">${s.letter}</div><div class="standing-info"><div class="standing-name">${s.name}</div><div class="standing-teams">${chips}</div></div><div class="standing-points"><div class="points-current">${s.totalPoints}</div><div class="points-potential">+${s.potentialPoints} potential</div></div></div>`;
      }).join('');
    }
    
    function getMatchupOrder() { return [[1,16], [8,9], [5,12], [4,13], [6,11], [3,14], [7,10], [2,15]]; }
    
    function renderBracket() {
      if (currentRegion === 'FinalFour') { renderFinalFour(); return; }
      const teams = appData.bracket[currentRegion] || [];
      const matchupOrder = getMatchupOrder();
      const r1Matchups = matchupOrder.map(([s1, s2]) => [teams.find(t => t.seed === s1), teams.find(t => t.seed === s2)]);
      document.getElementById('bracketContent').innerHTML = `<div class="round-headers"><div class="round-header">R64</div><div class="round-header">R32</div><div class="round-header">S16</div><div class="round-header">E8</div></div><div class="bracket-grid"><div class="bracket-column r1">${r1Matchups.map(([t1, t2]) => renderMatchup(t1, t2)).join('')}</div><div class="bracket-column r2">${[0,1,2,3].map(() => '<div class="matchup-empty">TBD</div>').join('')}</div><div class="bracket-column r3">${[0,1].map(() => '<div class="matchup-empty">TBD</div>').join('')}</div><div class="bracket-column r4"><div class="matchup-empty">→ Final Four</div></div></div>`;
    }
    
    function renderFinalFour() {
      document.getElementById('bracketContent').innerHTML = `<div class="final-four-bracket"><div class="ff-semifinal-row"><div class="ff-matchup"><div class="ff-matchup-label">Semifinal 1</div><div class="ff-team"><span class="seed-badge" style="background:var(--red);color:#fff">E</span><span class="team-name">East Champion</span></div><div class="ff-vs">VS</div><div class="ff-team"><span class="seed-badge" style="background:var(--blue);color:#fff">W</span><span class="team-name">West Champion</span></div></div><div class="ff-matchup"><div class="ff-matchup-label">Semifinal 2</div><div class="ff-team"><span class="seed-badge" style="background:var(--gold);color:#000">S</span><span class="team-name">South Champion</span></div><div class="ff-vs">VS</div><div class="ff-team"><span class="seed-badge" style="background:var(--green);color:#000">M</span><span class="team-name">Midwest Champion</span></div></div></div><div class="championship-matchup"><div class="championship-trophy">🏆</div><div class="championship-label">NATIONAL CHAMPIONSHIP</div><div class="championship-teams"><div class="ff-team"><span class="team-name">Winner Semifinal 1</span></div><div class="ff-vs">VS</div><div class="ff-team"><span class="team-name">Winner Semifinal 2</span></div></div></div></div>`;
    }
    
    function renderMatchup(t1, t2) {
      if (!t1 || !t2) return '<div class="matchup-empty">TBD</div>';
      const live = liveScores[t1.name] || liveScores[t2.name];
      return `<div class="matchup ${live ? 'live' : ''}">${renderMatchupTeam(t1, live)}${renderMatchupTeam(t2, live)}${live ? `<div class="live-badge"><span class="live-dot"></span>${live.clock || 'LIVE'}</div>` : ''}</div>`;
    }
    
    function renderMatchupTeam(t, live) {
      const info = teamsData[t.name] || {};
      let owner = null;
      appData.players.forEach(p => { if (p.teams.includes(t.name)) owner = p; });
      const score = live?.scores?.[t.name];
      return `<div class="matchup-team ${t.eliminated ? 'eliminated' : ''} ${t.wins > 0 && !t.eliminated ? 'winner' : ''}" onclick="showTeamPopup('${t.name}')"><span class="seed-badge" style="background:${info.colors?.[0] || '#333'};color:${info.colors?.[1] || '#fff'}">${info.seed || '?'}</span><span class="team-name">${t.name}</span>${owner ? `<span class="team-owner" style="background:linear-gradient(135deg,${owner.colorPrimary},${owner.colorSecondary})">${owner.letter}</span>` : ''}${score !== undefined ? `<span class="team-score">${score}</span>` : ''}</div>`;
    }
    
    async function loadLiveGames() {
      try {
        const res = await fetch('/api/scores');
        const data = await res.json();
        liveScores = {};
        if (!data.events || data.events.length === 0) {
          document.getElementById('liveGames').innerHTML = `<div class="no-games"><div class="no-games-icon">🏀</div><div>No games right now</div><div style="margin-top:8px;font-size:13px">Check back during tournament games!</div></div>`;
          return;
        }
        const html = data.events.map(event => {
          const comp = event.competitions[0];
          const teams = comp.competitors;
          const status = comp.status;
          const isLive = status.type.state === 'in';
          const isFinal = status.type.completed;
          const broadcast = comp.broadcasts?.[0]?.names?.[0] || 'TV';
          if (isLive) { teams.forEach(t => { liveScores[t.team.displayName] = { clock: status.displayClock, scores: {} }; teams.forEach(x => { liveScores[t.team.displayName].scores[x.team.displayName] = x.score; }); }); }
          const teamRows = teams.map(t => {
            const isWinner = isFinal && t.winner;
            let owner = null;
            appData.players.forEach(p => { if (p.teams.includes(t.team.displayName)) owner = p; });
            return `<div class="game-team ${isWinner ? 'winner' : ''}"><span class="seed-badge" style="background:rgba(255,255,255,0.1);color:#fff">${t.curatedRank?.current || '-'}</span><span class="team-name" style="flex:1">${t.team.displayName}</span>${owner ? `<span class="team-owner" style="background:linear-gradient(135deg,${owner.colorPrimary},${owner.colorSecondary})">${owner.letter}</span>` : ''}<span class="game-score">${t.score || '-'}</span></div>`;
          }).join('');
          return `<div class="live-game ${isLive ? 'is-live' : ''}">${teamRows}<div class="game-status">${isLive ? `<div class="status-live"><span class="live-dot"></span>${status.displayClock || ''} - ${status.period === 1 ? '1st Half' : '2nd Half'}</div>` : isFinal ? `<span style="color:var(--green);font-size:12px;font-weight:600">✓ FINAL</span>` : `<span style="font-size:12px;color:rgba(255,255,255,0.5)">${new Date(event.date).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}</span>`}<div style="display:flex;gap:8px;align-items:center"><span class="channel-badge">${broadcast}</span><a href="https://www.ncaa.com/march-madness-live/watch" target="_blank" class="watch-btn">▶ Watch</a></div></div></div>`;
        }).join('');
        document.getElementById('liveGames').innerHTML = html;
        renderBracket();
      } catch (err) { document.getElementById('liveGames').innerHTML = `<div class="no-games"><div class="no-games-icon">📡</div><div>Unable to load live scores</div></div>`; }
    }
    
    // ===== DRAFT =====
    function getSnakePickerIndex(pickNum) {
      const state = appData.draftState;
      const order = state.order.length > 0 ? state.order : [0, 1, 2, 3];
      const round = Math.floor(pickNum / 4);
      const pos = pickNum % 4;
      const orderIdx = round % 2 === 0 ? pos : 3 - pos;
      return order[orderIdx];
    }
    function getCurrentPickerIndex() { return getSnakePickerIndex(appData.draftState.currentPick); }
    function getUpNext(count = 3) {
      const next = [];
      for (let i = 1; i <= count; i++) {
        if (appData.draftState.currentPick + i < 64) next.push(appData.players[getSnakePickerIndex(appData.draftState.currentPick + i)]);
      }
      return next;
    }
    function calculateGrade(player) {
      if (player.teams.length === 0) return '?';
      let totalSeed = 0;
      player.teams.forEach(t => { const info = teamsData[t]; if (info) totalSeed += info.seed; });
      const avgSeed = totalSeed / player.teams.length;
      if (avgSeed <= 2.5) return 'A+';
      if (avgSeed <= 4) return 'A';
      if (avgSeed <= 5.5) return 'B+';
      if (avgSeed <= 7) return 'B';
      if (avgSeed <= 9) return 'C';
      return 'D';
    }
    function getGradeClass(grade) {
      if (grade.startsWith('A')) return 'grade-a';
      if (grade.startsWith('B')) return 'grade-b';
      if (grade.startsWith('C')) return 'grade-c';
      return 'grade-d';
    }
    function parseOdds(odds) { return parseInt((odds || '+100000').replace('+', '')); }
    function getDraftedTeams() {
      const drafted = new Set();
      appData.draftState.picks?.forEach(p => drafted.add(p.team));
      appData.players.forEach(p => p.teams.forEach(t => drafted.add(t)));
      return drafted;
    }
    function getAvailableTeams() {
      const drafted = getDraftedTeams();
      return Object.entries(teamsData).filter(([name]) => !drafted.has(name)).sort((a, b) => a[1].seed - b[1].seed);
    }
    
    function renderDraft() {
      const state = appData.draftState;
      const startBtn = document.getElementById('startBtn');
      const testBtn = document.getElementById('testBtn');
      const resetBtn = document.getElementById('resetBtn');
      const endBtn = document.getElementById('endBtn');
      if (state.active) {
        startBtn.style.display = 'none';
        testBtn.style.display = 'none';
        resetBtn.style.display = 'none';
        endBtn.style.display = 'inline-flex';
        renderActiveDraft();
      } else {
        const hasPicks = state.picks?.length > 0 || appData.players.some(p => p.teams.length > 0);
        startBtn.style.display = 'inline-flex';
        testBtn.style.display = 'inline-flex';
        resetBtn.style.display = hasPicks ? 'inline-flex' : 'none';
        endBtn.style.display = 'none';
        renderInactiveDraft(hasPicks);
      }
    }
    
    function renderInactiveDraft(hasPicks) {
      if (hasPicks) {
        document.getElementById('draftContent').innerHTML = `<div class="draft-inactive"><div class="draft-inactive-icon">✅</div><div class="draft-inactive-title">Draft Complete!</div><div class="draft-inactive-desc">${appData.draftState.picks?.length || 0} picks made</div></div><div class="war-room" style="margin-top:16px">${renderWarRoom()}</div>`;
      } else {
        document.getElementById('draftContent').innerHTML = `<div class="draft-inactive"><div class="draft-inactive-icon">🏀</div><div class="draft-inactive-title">Ready to Draft</div><div class="draft-inactive-desc">Click "Start Draft" to begin or "Test Draft" to practice</div></div>`;
      }
    }
    
    function renderActiveDraft() {
      const state = appData.draftState;
      const picker = appData.players[getCurrentPickerIndex()];
      const upNext = getUpNext();
      const timerClass = draftTimeLeft <= 10 ? 'critical' : draftTimeLeft <= 30 ? 'warning' : '';
      document.getElementById('draftContent').innerHTML = `
        ${state.testMode ? '<div style="background:rgba(245,158,11,0.2);border:1px solid rgba(245,158,11,0.4);border-radius:8px;padding:10px;text-align:center;margin-bottom:12px;font-size:12px;color:#f59e0b;font-weight:600">🧪 TEST MODE - Picks won\'t be saved</div>' : ''}
        <div class="on-the-clock ${timerClass}">
          <div class="clock-label">On The Clock</div>
          <div class="clock-drafter"><div class="clock-avatar" style="background:linear-gradient(135deg,${picker.colorPrimary},${picker.colorSecondary});box-shadow:0 0 20px ${picker.colorPrimary}66">${picker.letter}</div><div><div class="clock-name">${picker.name}</div><div class="clock-pick">Pick #${state.currentPick + 1} of 64 • Round ${Math.floor(state.currentPick / 4) + 1}</div></div></div>
          <div class="clock-timer ${timerClass}" id="timerDisplay">${formatTime(draftTimeLeft)}</div>
          ${draftTimeLeft <= 10 ? `<div class="auto-pick-warning">Auto-picking in ${draftTimeLeft}...</div>` : ''}
          <div class="up-next"><span class="up-next-label">Up Next:</span><div class="up-next-avatars">${upNext.map(p => `<div class="up-next-avatar" style="background:linear-gradient(135deg,${p.colorPrimary},${p.colorSecondary})">${p.letter}</div>`).join('')}</div></div>
        </div>
        <div class="draft-layout">
          <div class="draft-main">
            <div class="war-room">${renderWarRoom()}</div>
            <div class="all-teams-section">
              <div class="all-teams-header">
                <div class="all-teams-title">All Teams</div>
                <div class="region-filters">
                  <button class="region-filter ${currentRegionFilter === 'all' ? 'active' : ''}" onclick="filterDraftRegion('all')">All</button>
                  <button class="region-filter ${currentRegionFilter === 'East' ? 'active' : ''}" onclick="filterDraftRegion('East')">East</button>
                  <button class="region-filter ${currentRegionFilter === 'West' ? 'active' : ''}" onclick="filterDraftRegion('West')">West</button>
                  <button class="region-filter ${currentRegionFilter === 'South' ? 'active' : ''}" onclick="filterDraftRegion('South')">South</button>
                  <button class="region-filter ${currentRegionFilter === 'Midwest' ? 'active' : ''}" onclick="filterDraftRegion('Midwest')">Midwest</button>
                </div>
              </div>
              <div class="all-teams-grid" id="allTeamsGrid">${renderAllTeamsGrid()}</div>
            </div>
          </div>
          <div class="draft-sidebar">
            <div class="best-available"><div class="best-available-title">⭐ Best Available</div><div class="best-available-list">${renderBestAvailable()}</div></div>
          </div>
        </div>`;
      if (!draftTimer) startTimer();
    }
    
    function renderWarRoom() {
      const currentIdx = appData.draftState.active ? getCurrentPickerIndex() : -1;
      return appData.players.map((p, idx) => {
        const grade = calculateGrade(p);
        const regions = { East: 0, West: 0, South: 0, Midwest: 0 };
        let totalOdds = 0, totalSeed = 0;
        p.teams.forEach(t => { const info = teamsData[t]; if (info) { regions[info.region]++; totalOdds += parseOdds(oddsData.championship[t]); totalSeed += info.seed; } });
        const avgSeed = p.teams.length > 0 ? (totalSeed / p.teams.length).toFixed(1) : '-';
        const teamsHtml = p.teams.slice(-4).map(t => {
          const info = teamsData[t]; if (!info) return '';
          return `<div class="war-room-team" style="background:${info.colors[0]}33;border:1px solid ${info.colors[0]}55" onclick="showTeamPopup('${t}')"><span class="war-room-seed" style="background:${info.colors[0]};color:${info.colors[1]}">${info.seed}</span><span style="color:#fff">${t.substring(0,8)}</span></div>`;
        }).join('');
        return `<div class="war-room-player ${idx === currentIdx ? 'active' : ''}">
          <div class="war-room-header"><div class="war-room-avatar" style="background:linear-gradient(135deg,${p.colorPrimary},${p.colorSecondary})">${p.letter}</div><div class="war-room-info"><div class="war-room-name">${p.name}</div><div class="war-room-count">${p.teams.length} teams</div></div><div class="war-room-grade ${getGradeClass(grade)}">${grade}</div></div>
          <div class="war-room-stats"><div class="war-room-stat"><span style="color:rgba(255,255,255,0.5)">Avg:</span> <span style="color:var(--gold);font-weight:600">${avgSeed}</span></div><div class="war-room-stat"><span style="color:rgba(255,255,255,0.5)">Σ:</span> <span style="color:var(--green);font-weight:600">+${totalOdds.toLocaleString()}</span></div></div>
          <div class="region-bars">${['East','West','South','Midwest'].map((r,i) => `<div class="region-bar" style="background:${regions[r] > 0 ? ['#bf0a30','#002868','#ffd700','#00d4aa'][i] : 'rgba(255,255,255,0.1)'}"></div>`).join('')}</div>
          <div class="war-room-teams">${teamsHtml || '<div style="font-size:9px;color:rgba(255,255,255,0.3)">No teams</div>'}</div>
        </div>`;
      }).join('');
    }
    
    function renderBestAvailable() {
      const available = getAvailableTeams().slice(0, 10);
      return available.map(([name, info]) => {
        const odds = oddsData.championship[name] || '';
        return `<button class="best-team-btn" onclick="showScoutingReport('${name}')" style="background:linear-gradient(135deg,${info.colors[0]}22,${info.colors[0]}11);border-color:${info.colors[0]}55"><span class="best-team-seed" style="background:${info.colors[0]};color:${info.colors[1]}">${info.seed}</span><div class="best-team-info"><div class="best-team-name">${name}</div><div class="best-team-stats">${info.record} • NET #${info.net}</div></div>${odds ? `<span class="best-team-odds">${odds}</span>` : ''}</button>`;
      }).join('');
    }
    
    function renderAllTeamsGrid() {
      const available = getAvailableTeams();
      const filtered = currentRegionFilter === 'all' ? available : available.filter(([_, info]) => info.region === currentRegionFilter);
      return filtered.map(([name, info]) => {
        const odds = oddsData.championship[name] || '';
        return `<button class="all-team-btn" onclick="showScoutingReport('${name}')" style="background:linear-gradient(135deg,${info.colors[0]}22,${info.colors[0]}11);border-color:${info.colors[0]}55"><span class="all-team-seed" style="background:${info.colors[0]};color:${info.colors[1]}">${info.seed}</span><div class="all-team-info"><div class="all-team-name">${name}</div><div class="all-team-stats">${info.record} • #${info.net}</div></div>${odds ? `<span class="all-team-odds">${odds}</span>` : ''}</button>`;
      }).join('');
    }
    
    function filterDraftRegion(region) {
      currentRegionFilter = region;
      document.querySelectorAll('.region-filter').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`.region-filter[onclick="filterDraftRegion('${region}')"]`)?.classList.add('active');
      document.getElementById('allTeamsGrid').innerHTML = renderAllTeamsGrid();
    }
    
    function showScoutingReport(teamName) {
      const team = teamsData[teamName]; if (!team) return;
      selectedTeamForDraft = teamName;
      const player = appData.players[getCurrentPickerIndex()];
      const odds = oddsData.championship[teamName] || '-';
      document.getElementById('scoutingReport').innerHTML = `
        <div class="scouting-header" style="background:linear-gradient(135deg,${team.colors[0]},${team.colors[0]}cc)">
          <button class="scouting-close" onclick="closeScoutingReport()">✕</button>
          <div class="scouting-team"><div class="scouting-logo" style="background:${team.colors[1]};color:${team.colors[0]}">${teamName.charAt(0)}</div><div><div class="scouting-name" style="color:${team.colors[1]}">${teamName}</div><div class="scouting-meta" style="color:${team.colors[1]}cc">#${team.seed} Seed • ${team.region} Region</div></div></div>
        </div>
        <div class="scouting-body">
          <div class="scouting-stats">
            <div class="scouting-stat"><div class="scouting-stat-label">Record</div><div class="scouting-stat-value" style="color:#fff">${team.record}</div></div>
            <div class="scouting-stat"><div class="scouting-stat-label">NET Rank</div><div class="scouting-stat-value" style="color:var(--gold)">#${team.net}</div></div>
            <div class="scouting-stat"><div class="scouting-stat-label">Title Odds</div><div class="scouting-stat-value" style="color:var(--green)">${odds}</div></div>
          </div>
          <div class="quadrant-title">Quadrant Record</div>
          <div class="quadrant-grid">
            <div class="quadrant-item" style="background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.3)"><div class="quadrant-label" style="color:#00d4aa">Q1</div><div class="quadrant-value">${team.q1}</div></div>
            <div class="quadrant-item" style="background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3)"><div class="quadrant-label" style="color:#ffd700">Q2</div><div class="quadrant-value">${team.q2}</div></div>
            <div class="quadrant-item" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1)"><div class="quadrant-label" style="color:rgba(255,255,255,0.5)">Q3</div><div class="quadrant-value">${team.q3}</div></div>
            <div class="quadrant-item" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1)"><div class="quadrant-label" style="color:rgba(255,255,255,0.5)">Q4</div><div class="quadrant-value">${team.q4}</div></div>
          </div>
          <button class="draft-confirm-btn" onclick="confirmDraftPick()"><span>Draft to</span><span class="draft-confirm-avatar" style="background:linear-gradient(135deg,${player.colorPrimary},${player.colorSecondary})">${player.letter}</span><span>${player.name}</span></button>
        </div>`;
      document.getElementById('scoutingOverlay').classList.add('active');
    }
    
    function closeScoutingReport() {
      document.getElementById('scoutingOverlay').classList.remove('active');
      selectedTeamForDraft = null;
    }
    
    function confirmDraftPick() {
      if (!selectedTeamForDraft) return;
      closeScoutingReport();
      makePick(selectedTeamForDraft);
    }
    
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }
    
    function startTimer() {
      stopTimer();
      draftTimeLeft = appData.draftState.timerSeconds || 120;
      draftTimer = setInterval(() => {
        draftTimeLeft--;
        const display = document.getElementById('timerDisplay');
        if (display) {
          display.textContent = formatTime(draftTimeLeft);
          display.className = 'clock-timer' + (draftTimeLeft <= 10 ? ' critical' : draftTimeLeft <= 30 ? ' warning' : '');
        }
        if (draftTimeLeft <= 0) { stopTimer(); autoPick(); }
        else if (draftTimeLeft <= 10 || draftTimeLeft === 30) renderDraft();
      }, 1000);
    }
    
    function stopTimer() { if (draftTimer) { clearInterval(draftTimer); draftTimer = null; } }
    
    async function autoPick() {
      const available = getAvailableTeams();
      if (available.length > 0) await makePick(available[0][0]);
    }
    
    async function startDraft(testMode) {
      await fetch('/api/draft/start', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ order: [0, 1, 2, 3], timerSeconds: 120, testMode }) });
      await loadData();
      showToast(testMode ? '🧪 Test draft started!' : '🚀 Draft started!');
    }
    
    async function makePick(teamName) {
      const playerIndex = getCurrentPickerIndex();
      const team = teamsData[teamName];
      const player = appData.players[playerIndex];
      showPickAnimation(teamName, team, player);
      if (team.seed === 1) showConfetti(team.colors[0]);
      await fetch('/api/draft/pick', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ teamName, playerIndex }) });
      setTimeout(async () => { await loadData(); draftTimeLeft = 120; }, 2200);
    }
    
    function showPickAnimation(teamName, team, player) {
      const overlay = document.getElementById('pickOverlay');
      const card = document.getElementById('pickCard');
      const pickNum = appData.draftState.currentPick + 1;
      card.innerHTML = `<div style="width:280px;border-radius:16px;overflow:hidden;background:linear-gradient(180deg,${team.colors[0]} 0%,${team.colors[0]}dd 100%);box-shadow:0 20px 60px ${team.colors[0]}88,0 0 100px ${team.colors[0]}44;"><div style="padding:32px 24px;text-align:center;position:relative;"><div style="position:absolute;top:-20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#ffd700,#ffb800);color:#000;padding:6px 20px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;">Pick #${pickNum}</div><div style="width:80px;height:80px;margin:20px auto 16px;background:${team.colors[1]};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;color:${team.colors[0]};box-shadow:0 4px 20px rgba(0,0,0,0.3);">${teamName.charAt(0)}</div><div style="font-size:28px;font-weight:800;color:${team.colors[1]};text-shadow:0 2px 10px rgba(0,0,0,0.3);">${teamName.toUpperCase()}</div><div style="display:flex;justify-content:center;gap:12px;margin-top:12px;"><span style="background:${team.colors[1]};color:${team.colors[0]};padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600;">#${team.seed} Seed</span><span style="background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:6px;font-size:12px;color:${team.colors[1]};">${team.region}</span></div></div><div style="background:rgba(0,0,0,0.3);padding:16px 24px;display:flex;align-items:center;justify-content:center;gap:12px;"><div style="font-size:12px;color:rgba(255,255,255,0.7);">DRAFTED BY</div><div style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,${player.colorPrimary},${player.colorSecondary});display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;">${player.letter}</div><div style="font-size:16px;font-weight:600;color:#fff;">${player.name}</div></div></div>`;
      overlay.classList.add('active');
      setTimeout(() => card.classList.add('show'), 50);
      setTimeout(() => { card.classList.remove('show'); setTimeout(() => overlay.classList.remove('active'), 300); }, 2000);
    }
    
    function showConfetti(color) {
      const container = document.getElementById('confettiContainer');
      for (let i = 0; i < 50; i++) {
        const piece = document.createElement('div');
        piece.style.cssText = `position:absolute;width:${Math.random()*10+5}px;height:${Math.random()*10+5}px;background:${Math.random()>0.5?color:'#ffd700'};left:${Math.random()*100}%;top:-20px;opacity:${Math.random()*0.5+0.5};transform:rotate(${Math.random()*360}deg);animation:confettiFall ${Math.random()*2+2}s linear forwards;`;
        container.appendChild(piece);
        setTimeout(() => piece.remove(), 4000);
      }
    }
    
    async function endDraft() {
      stopTimer();
      await fetch('/api/draft/end', { method: 'POST' });
      await loadData();
      showToast('Draft ended!');
    }
    
    async function resetDraft() {
      if (!confirm('Reset the draft? This will clear all picks.')) return;
      const clearTeams = confirm('Also clear team assignments from players?');
      stopTimer();
      await fetch('/api/draft/reset', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ clearTeams }) });
      await loadData();
      showToast('Draft reset!');
    }
    
    function showTeamPopup(teamName) {
      const team = teamsData[teamName]; if (!team) return;
      let owner = null;
      appData.players.forEach(p => { if (p.teams.includes(teamName)) owner = p; });
      const champOdds = oddsData.championship[teamName];
      const ffOdds = oddsData.finalFour[teamName];
      document.getElementById('teamPopup').innerHTML = `<div class="popup-header" style="background:linear-gradient(135deg,${team.colors[0]},${team.colors[0]}cc)"><button class="popup-close" onclick="closePopup()">✕</button><div class="popup-team-name">${teamName}</div><div class="popup-team-info">#${team.seed} Seed · ${team.region} Region · ${team.record}</div></div>${champOdds || ffOdds ? `<div class="popup-section"><div class="popup-section-title">Championship Odds</div><div class="odds-grid">${champOdds ? `<div class="odds-item"><div class="odds-label">Championship</div><div class="odds-value">${champOdds}</div></div>` : ''}${ffOdds ? `<div class="odds-item"><div class="odds-label">Final Four</div><div class="odds-value ${ffOdds.startsWith('-')?'negative':''}">${ffOdds}</div></div>` : ''}<div class="odds-item"><div class="odds-label">NET Rank</div><div class="odds-value">#${team.net}</div></div></div></div>` : ''}<div class="popup-section"><div class="popup-section-title">Quadrant Record</div><div class="popup-quadrant-grid"><div class="popup-quadrant-item"><div class="popup-quadrant-label">Q1</div><div class="popup-quadrant-value">${team.q1}</div></div><div class="popup-quadrant-item"><div class="popup-quadrant-label">Q2</div><div class="popup-quadrant-value">${team.q2}</div></div><div class="popup-quadrant-item"><div class="popup-quadrant-label">Q3</div><div class="popup-quadrant-value">${team.q3}</div></div><div class="popup-quadrant-item"><div class="popup-quadrant-label">Q4</div><div class="popup-quadrant-value">${team.q4}</div></div></div></div>${owner ? `<div class="popup-owner"><div class="popup-owner-avatar" style="background:linear-gradient(135deg,${owner.colorPrimary},${owner.colorSecondary})">${owner.letter}</div><div><div class="popup-owner-label">Drafted by</div><div class="popup-owner-name">${owner.name}</div></div></div>` : ''}`;
      document.getElementById('popupOverlay').classList.add('active');
    }
    
    function closePopup() { document.getElementById('popupOverlay').classList.remove('active'); }
    document.getElementById('popupOverlay').addEventListener('click', e => { if (e.target.id === 'popupOverlay') closePopup(); });
    document.getElementById('scoutingOverlay').addEventListener('click', e => { if (e.target.id === 'scoutingOverlay') closeScoutingReport(); });
    
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }
    
    setInterval(loadLiveGames, 30000);
    setInterval(() => { if (appData?.draftState?.active) loadData(); }, 5000);
    loadData();
  </script>
</body>
</html>
